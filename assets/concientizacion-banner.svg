<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#0ea5e9" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0b1220" flood-opacity="0.22"/>
    </filter>
    <style>
      .title { font: 800 48px/1.1 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 600 20px/1.4 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: #e0f2fe; }
      .pill { font: 800 16px/1 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: #0f172a; }
      .pill2 { font: 800 16px/1 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: #052e16; }
    </style>
  </defs>

  <rect width="1400" height="420" rx="28" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="-140" y="-60" width="720" height="520" transform="rotate(18 0 0)" fill="url(#shine)"/>

  <!-- Icono hoja -->
  <g transform="translate(90,75)">
    <path d="M160 0C88 24 38 82 30 152c-7 68 25 129 81 162 60 35 135 29 195-10 52-33 85-90 86-153 1-66-30-122-84-163C258 7 210-6 160 0Z" fill="rgba(255,255,255,0.18)"/>
    <path d="M170 46c-52 18-88 60-93 109-6 53 21 100 68 126 51 29 114 23 164-8 42-25 68-67 69-115 1-50-24-93-67-126-34-26-69-36-111-26Z" fill="rgba(255,255,255,0.14)"/>
    <path d="M120 285c55-95 126-159 236-196" stroke="#ffffff" stroke-opacity="0.85" stroke-width="10" stroke-linecap="round"/>
    <path d="M150 260c28-50 67-92 120-124" stroke="#22c55e" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Texto -->
  <text x="420" y="165" class="title">Concientizacion</text>
  <text x="420" y="220" class="subtitle">Menos plastico de un solo uso = mas vida para los ecosistemas</text>

  <!-- Pťldoras con datos (resumen visual) -->
  <g transform="translate(420,255)">
    <rect x="0" y="0" width="320" height="58" rx="18" fill="#ffffff" fill-opacity="0.92"/>
    <text x="24" y="38" class="pill">Plastico anual: ~400 Mt</text>

    <rect x="340" y="0" width="300" height="58" rx="18" fill="#ffffff" fill-opacity="0.18" stroke="#e0f2fe" stroke-opacity="0.55"/>
    <text x="364" y="38" class="pill2">Marino: >85% plastico</text>

    <rect x="650" y="0" width="230" height="58" rx="18" fill="#0f172a" fill-opacity="0.18"/>
    <text x="678" y="38" class="pill2">Reciclado: 9%</text>
  </g>

  <!-- Sello -->
  <g transform="translate(1090,70)">
    <rect x="0" y="0" width="210" height="94" rx="20" fill="#0f172a" fill-opacity="0.16" stroke="#e0f2fe" stroke-opacity="0.45"/>
    <text x="20" y="42" style="font: 900 20px/1 Inter, system-ui; fill:#e0f2fe;">Accion diaria</text>
    <text x="20" y="70" style="font: 700 16px/1.1 Inter, system-ui; fill:#ffffff; fill-opacity:0.9;">cambia el impacto</text>
  </g>
</svg>

